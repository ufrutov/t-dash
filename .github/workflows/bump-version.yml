name: Bump Version

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write

jobs:
  bump-version:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Get latest tag
        id: get_tag
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Determine bump type
        id: bump_type
        run: |
          COMMITS=$(git log ${{ steps.get_tag.outputs.latest_tag }}..HEAD --oneline)
          
          MAJOR=0
          MINOR=0
          PATCH=0
          
          if echo "$COMMITS" | grep -qiE "^(BREAKING|breaking|major)"; then
            MAJOR=1
          elif echo "$COMMITS" | grep -qiE "^(feat|feature)"; then
            MINOR=1
          else
            PATCH=1
          fi
          
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "patch=$PATCH" >> $GITHUB_OUTPUT

      - name: Bump version and create tag
        run: |
          CURRENT_TAG=${{ steps.get_tag.outputs.latest_tag }}
          
          # Extract version numbers
          MAJOR=$(echo $CURRENT_TAG | sed 's/v\([0-9]*\).*/\1/')
          MINOR=$(echo $CURRENT_TAG | sed 's/v[0-9]*\.\([0-9]*\).*/\1/')
          PATCH=$(echo $CURRENT_TAG | sed 's/v[0-9]*\.[0-9]*\.\([0-9]*\).*/\1/')
          
          # Bump version based on commit messages
          if [ ${{ steps.bump_type.outputs.major }} -eq 1 ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ ${{ steps.bump_type.outputs.minor }} -eq 1 ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          
          NEW_TAG="v$MAJOR.$MINOR.$PATCH"
          echo "New version: $NEW_TAG"
          
          # Update package.json version
          npm version $NEW_TAG --no-git-tag-version
          
          # Create tag
          git tag $NEW_TAG
          
          # Commit version bump
          git add package.json
          git commit -m "chore: bump version to $NEW_TAG"

      - name: Push changes and tags
        run: |
          git push
          git push --tags